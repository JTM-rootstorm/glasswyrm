schema = 1
source_hash_status = "pending verified upstream release tarballs"

[[client]]
application = "xeyes"
version = "1.3.1"
source_sha256 = "PENDING"
build_source = "verified upstream source release when Gentoo lacks the exact version"
argv = ["xeyes", "+shape", "+render", "-geometry", "150x100+32+32", "-fg", "black", "-bg", "white", "-outline", "black", "-center", "white"]
environment = ["LC_ALL=C", "LANG=C", "XMODIFIERS=@im=none", "SESSION_MANAGER=", "XAUTHORITY=/dev/null", "DISPLAY=:99"]
expected_extension_queries = ["SHAPE", "RENDER"]
disabled_optional_features = ["shaped windows", "Render"]
expected_trace = "tests/fixtures/m9/xeyes.trace.json"
expected_frame = "tests/fixtures/m9/xeyes-final.ppm"

[[client]]
application = "xclock-analog"
version = "1.2.0"
source_sha256 = "PENDING"
build_source = "verified upstream source release when Gentoo lacks the exact version"
argv = ["xclock", "-analog", "-norender", "-update", "0", "-geometry", "164x164+240+32", "-fg", "black", "-bg", "white", "-hd", "black", "-hl", "black", "-fn", "fixed"]
environment = ["LC_ALL=C", "LANG=C", "TZ=UTC", "XMODIFIERS=@im=none", "SESSION_MANAGER=", "XAUTHORITY=/dev/null", "LD_PRELOAD=libgw_m9_fixed_time.so", "DISPLAY=:99"]
expected_extension_queries = ["RENDER"]
disabled_optional_features = ["Render", "timer updates"]
expected_trace = "tests/fixtures/m9/xclock-analog.trace.json"
expected_frame = "tests/fixtures/m9/xclock-analog.ppm"

[[client]]
application = "xclock-digital"
version = "1.2.0"
source_sha256 = "PENDING"
build_source = "verified upstream source release when Gentoo lacks the exact version"
argv = ["xclock", "-digital", "-brief", "-twentyfour", "-norender", "-update", "0", "-geometry", "+240+240", "-fg", "black", "-bg", "white", "-fn", "fixed"]
environment = ["LC_ALL=C", "LANG=C", "TZ=UTC", "XMODIFIERS=@im=none", "SESSION_MANAGER=", "XAUTHORITY=/dev/null", "LD_PRELOAD=libgw_m9_fixed_time.so", "DISPLAY=:99"]
expected_extension_queries = ["RENDER"]
disabled_optional_features = ["Render", "locale font sets", "timer updates"]
expected_trace = "tests/fixtures/m9/xclock-digital.trace.json"
expected_frame = "tests/fixtures/m9/xclock-digital.ppm"
